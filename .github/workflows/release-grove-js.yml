name: Release Grove JS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'npm version to publish (e.g., 0.1.0, 1.0.0-beta.1)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip actual publish)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Publish @grove-js/crdt
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crdt-js

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Set version
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Dry run publish
        if: ${{ inputs.dry_run }}
        run: npm publish --access public --dry-run
